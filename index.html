<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>さぎぬまSC 47期 ダッシュボード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1a7a3c;
    --green-light: #2ea84f;
    --green-dark: #0f4d25;
    --gold: #f0b429;
    --gold-dark: #c88f00;
    --white: #f8faf8;
    --gray-light: #eef2ee;
    --gray: #8a9e8a;
    --dark: #0d1f12;
    --card-bg: #ffffff;
    --shadow: 0 4px 24px rgba(15,77,37,0.10);
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--white);
    color: var(--dark);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, var(--green-dark) 0%, var(--green) 60%, var(--green-light) 100%);
    padding: 0;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      45deg,
      rgba(255,255,255,0.03) 0px,
      rgba(255,255,255,0.03) 2px,
      transparent 2px,
      transparent 20px
    );
  }
  .header-inner {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 22px 32px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .header-emblem {
    width: 64px; height: 64px;
    background: var(--gold);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Oswald', sans-serif;
    font-size: 22px; font-weight: 700;
    color: var(--green-dark);
    flex-shrink: 0;
    box-shadow: 0 2px 12px rgba(240,180,41,0.4);
    letter-spacing: 0.5px;
  }
  .header-text h1 {
    font-family: 'Oswald', sans-serif;
    font-size: 28px; font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
    line-height: 1.1;
  }
  .header-text p {
    color: rgba(255,255,255,0.75);
    font-size: 13px; font-weight: 400;
    margin-top: 4px;
    letter-spacing: 0.5px;
  }
  .header-badge {
    margin-left: auto;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    padding: 8px 16px;
    text-align: center;
  }
  .header-badge .num { font-family: 'Oswald', sans-serif; font-size: 22px; color: var(--gold); font-weight: 700; }
  .header-badge .lbl { font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 1px; }

  /* ── NAV TABS ── */
  nav {
    background: var(--green-dark);
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  .nav-inner {
    display: flex;
    max-width: 1100px; margin: 0 auto;
    overflow-x: auto;
  }
  .tab-btn {
    padding: 14px 28px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px; font-weight: 700;
    color: rgba(255,255,255,0.65);
    background: none; border: none;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }
  .tab-btn:hover { color: #fff; background: rgba(255,255,255,0.06); }
  .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* ── MAIN ── */
  main { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; }

  .section { display: none; }
  .section.active { display: block; }

  /* ── SECTION TITLE ── */
  .section-title {
    font-family: 'Oswald', sans-serif;
    font-size: 22px; font-weight: 600;
    color: var(--green-dark);
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px;
    letter-spacing: 0.5px;
  }
  .section-title::before {
    content: '';
    display: block; width: 5px; height: 26px;
    background: var(--green-light);
    border-radius: 3px;
  }

  /* ── CARD ── */
  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 20px;
    border: 1px solid rgba(26,122,60,0.08);
  }
  .card-header {
    background: linear-gradient(90deg, var(--green-dark), var(--green));
    padding: 12px 20px;
    color: #fff;
    font-weight: 700; font-size: 14px;
    display: flex; align-items: center; gap: 8px;
    letter-spacing: 0.3px;
  }
  .card-body { padding: 16px 20px; }

  /* ── TABLE ── */
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  thead th {
    background: var(--gray-light);
    padding: 10px 14px;
    text-align: left;
    font-size: 12px; font-weight: 700;
    color: var(--green-dark);
    letter-spacing: 0.5px;
    border-bottom: 2px solid rgba(26,122,60,0.15);
  }
  tbody tr {
    border-bottom: 1px solid var(--gray-light);
    transition: background 0.15s;
  }
  tbody tr:hover { background: #f0f9f3; }
  tbody tr:last-child { border-bottom: none; }
  td { padding: 11px 14px; vertical-align: middle; }
  .num-col { font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 16px; color: var(--green-dark); }
  .center { text-align: center; }

  /* ── PLAYER GRID ── */
  .player-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 14px;
  }
  .player-card {
    background: var(--card-bg);
    border: 1px solid rgba(26,122,60,0.1);
    border-radius: 12px;
    padding: 18px 14px;
    text-align: center;
    box-shadow: 0 2px 10px rgba(15,77,37,0.07);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .player-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(15,77,37,0.13); }
  .player-number {
    font-family: 'Oswald', sans-serif;
    font-size: 32px; font-weight: 700;
    color: var(--green);
    line-height: 1;
  }
  .player-name { font-size: 15px; font-weight: 700; margin-top: 8px; color: var(--dark); }
  .player-kana { font-size: 11px; color: var(--gray); margin-top: 3px; }
  .player-school {
    font-size: 11px; color: var(--green-dark);
    background: var(--gray-light);
    border-radius: 20px;
    padding: 3px 10px;
    display: inline-block;
    margin-top: 8px;
  }

  /* ── MATCH CARD ── */
  .match-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid rgba(26,122,60,0.08);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .match-header {
    padding: 12px 20px;
    display: flex; align-items: center; gap: 12px;
    background: var(--gray-light);
    border-bottom: 1px solid rgba(26,122,60,0.1);
  }
  .match-badge {
    font-size: 11px; font-weight: 700;
    padding: 3px 10px; border-radius: 20px;
    letter-spacing: 0.5px;
  }
  .badge-official { background: var(--green-dark); color: #fff; }
  .badge-trm { background: var(--gold); color: var(--dark); }
  .match-date { font-size: 13px; color: var(--gray); }
  .match-name { font-weight: 700; font-size: 14px; color: var(--dark); }
  .match-body { padding: 16px 20px; }
  .score-row {
    display: flex; align-items: center; justify-content: center;
    gap: 20px; margin-bottom: 16px;
  }
  .team-name { font-size: 14px; font-weight: 700; text-align: center; flex: 1; }
  .score-box {
    display: flex; align-items: center; gap: 8px;
  }
  .score-num {
    font-family: 'Oswald', sans-serif;
    font-size: 42px; font-weight: 700;
    color: var(--green-dark);
    line-height: 1;
  }
  .score-sep { font-size: 28px; color: var(--gray); font-weight: 300; }
  .score-result {
    font-family: 'Oswald', sans-serif;
    font-size: 13px; font-weight: 600;
    padding: 4px 12px; border-radius: 6px;
    letter-spacing: 1px;
  }
  .result-win { background: #e8f9ee; color: var(--green); border: 1px solid var(--green-light); }
  .result-lose { background: #fde8e8; color: #c0392b; border: 1px solid #e74c3c; }
  .result-draw { background: #fff8e1; color: var(--gold-dark); border: 1px solid var(--gold); }

  .match-details {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; margin-top: 12px;
  }
  .detail-block { font-size: 13px; }
  .detail-label {
    font-size: 11px; font-weight: 700;
    color: var(--gray); letter-spacing: 0.5px;
    margin-bottom: 5px;
    text-transform: uppercase;
  }
  .detail-content { line-height: 1.7; }
  .player-tag {
    display: inline-block;
    background: var(--gray-light);
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 12px; margin: 2px;
    color: var(--dark);
  }
  .scorer-tag {
    background: #fff8e1;
    border: 1px solid var(--gold);
    color: var(--gold-dark);
  }
  .yt-link {
    display: inline-flex; align-items: center; gap: 6px;
    color: #c0392b; font-size: 13px; font-weight: 700;
    text-decoration: none;
    padding: 5px 12px;
    border: 1px solid #e74c3c;
    border-radius: 6px;
    transition: background 0.15s;
  }
  .yt-link:hover { background: #fde8e8; }

  /* ── STATS GRID ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--card-bg);
    border-radius: 12px;
    padding: 18px 20px;
    box-shadow: var(--shadow);
    border-left: 4px solid var(--green-light);
    border: 1px solid rgba(26,122,60,0.1);
    border-left: 4px solid var(--green-light);
  }
  .stat-label { font-size: 12px; color: var(--gray); font-weight: 600; letter-spacing: 0.5px; }
  .stat-value {
    font-family: 'Oswald', sans-serif;
    font-size: 32px; font-weight: 700;
    color: var(--green-dark);
    line-height: 1.1; margin-top: 4px;
  }
  .stat-sub { font-size: 12px; color: var(--gray); margin-top: 2px; }

  /* ── RANKING ── */
  .rank-row {
    display: flex; align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--gray-light);
    gap: 14px;
    transition: background 0.15s;
  }
  .rank-row:hover { background: #f0f9f3; }
  .rank-row:last-child { border-bottom: none; }
  .rank-pos {
    font-family: 'Oswald', sans-serif;
    font-size: 20px; font-weight: 700;
    width: 32px; text-align: center;
    flex-shrink: 0;
  }
  .rank-pos.gold { color: #f0b429; }
  .rank-pos.silver { color: #9e9e9e; }
  .rank-pos.bronze { color: #cd7f32; }
  .rank-pos.other { color: var(--gray); font-size: 16px; }
  .rank-num-badge {
    background: var(--green-dark);
    color: #fff;
    font-family: 'Oswald', sans-serif;
    font-size: 14px; font-weight: 600;
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .rank-name { flex: 1; font-weight: 700; font-size: 15px; }
  .rank-kana { font-size: 11px; color: var(--gray); font-weight: 400; }
  .rank-goals {
    font-family: 'Oswald', sans-serif;
    font-size: 22px; font-weight: 700;
    color: var(--green);
  }
  .rank-goals span { font-size: 12px; color: var(--gray); font-weight: 400; }
  .rank-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .rank-tab-btn {
    padding: 7px 18px; border-radius: 20px;
    font-size: 13px; font-weight: 700;
    border: 2px solid var(--green-light);
    background: none; cursor: pointer;
    color: var(--green);
    transition: all 0.15s;
  }
  .rank-tab-btn.active { background: var(--green-light); color: #fff; }

  /* ── MISC ── */
  .month-selector {
    display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .month-btn {
    padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;
    border: 2px solid rgba(26,122,60,0.2); background: none; cursor: pointer;
    color: var(--green-dark); transition: all 0.15s;
  }
  .month-btn:hover { border-color: var(--green-light); background: var(--gray-light); }
  .month-btn.active { background: var(--green); color: #fff; border-color: var(--green); }

  .filter-row { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; align-items: center; }
  .filter-btn {
    padding: 6px 16px; border-radius: 6px; font-size: 13px; font-weight: 600;
    border: 1px solid rgba(26,122,60,0.2); background: none; cursor: pointer;
    color: var(--dark); transition: all 0.15s;
  }
  .filter-btn.active { background: var(--green-dark); color: #fff; border-color: var(--green-dark); }

  .empty-msg { text-align: center; color: var(--gray); padding: 40px; font-size: 14px; }

  @media (max-width: 600px) {
    .header-inner { padding: 16px; gap: 12px; }
    .header-text h1 { font-size: 20px; }
    .header-badge { display: none; }
    main { padding: 16px 12px 60px; }
    .match-details { grid-template-columns: 1fr; }
    .score-num { font-size: 34px; }
    .player-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-emblem">SC</div>
    <div class="header-text">
      <h1>さぎぬまSC</h1>
      <p>47期（2年生）選手・試合情報ダッシュボード</p>
    </div>
    <div class="header-badge">
      <div class="num">47期</div>
      <div class="lbl">2026年度</div>
    </div>
  </div>
</header>

<nav>
  <div class="nav-inner">
    <button class="tab-btn active" onclick="showTab('players')">⚽ 選手情報</button>
    <button class="tab-btn" onclick="showTab('matches')">📋 試合結果</button>
    <button class="tab-btn" onclick="showTab('stats')">📊 成績表</button>
  </div>
</nav>

<main>

  <!-- ===== TAB1: 選手情報 ===== -->
  <div id="tab-players" class="section active">
    <div class="section-title">選手情報</div>
    <div class="player-grid" id="playerGrid"></div>
  </div>

  <!-- ===== TAB2: 試合結果 ===== -->
  <div id="tab-matches" class="section">
    <div class="section-title">試合結果</div>
    <div class="filter-row">
      <span style="font-size:13px;color:var(--gray);font-weight:600;">種別：</span>
      <button class="filter-btn active" onclick="filterMatches('all', this)">すべて</button>
      <button class="filter-btn" onclick="filterMatches('公式戦', this)">公式戦</button>
      <button class="filter-btn" onclick="filterMatches('TRM', this)">TRM</button>
    </div>
    <div id="matchList"></div>
  </div>

  <!-- ===== TAB3: 成績表 ===== -->
  <div id="tab-stats" class="section">
    <div class="section-title">成績表</div>

    <!-- 当月成績 -->
    <div class="card" style="margin-bottom:24px;">
      <div class="card-header">📅 当月の成績
        <span style="margin-left:auto; font-weight:400; font-size:13px; opacity:0.8;" id="currentMonthLabel"></span>
      </div>
      <div class="card-body">
        <div class="stats-grid" id="monthStats"></div>
      </div>
    </div>

    <!-- 通算成績 -->
    <div class="card" style="margin-bottom:24px;">
      <div class="card-header">📈 47期 通算成績</div>
      <div class="card-body">
        <div class="stats-grid" id="totalStats"></div>
      </div>
    </div>

    <!-- 得点ランキング -->
    <div class="card">
      <div class="card-header">🏆 得点ランキング</div>
      <div class="card-body" style="padding-top:14px;">
        <div class="rank-tabs">
          <button class="rank-tab-btn active" onclick="switchRanking('all', this)">TRM含む全て</button>
          <button class="rank-tab-btn" onclick="switchRanking('official', this)">公式戦のみ</button>
        </div>
        <div id="rankingList"></div>
      </div>
    </div>
  </div>

</main>

<script>
// ============================
//  設定：Apps Script API URL
// ============================
const API_URL = 'https://script.google.com/macros/s/AKfycbzXQpxCdaHleuy9X8DH3QLw7Wra9LrMpsd2_UUfUR-w01rmS9Fq_kMeXnU3_SCvQxYU/exec';

// ============================
//  グローバルデータ
// ============================
let PLAYERS = [];
let MATCHES = [];
let APPEARANCES = [];
let currentFilter = 'all';
let currentRankingMode = 'all';

// ============================
//  データ取得
// ============================
async function fetchSheet(sheetName) {
  const res = await fetch(`${API_URL}?sheet=${encodeURIComponent(sheetName)}`);
  return res.json();
}

function showLoading(id, msg='読み込み中...') {
  const el = document.getElementById(id);
  if(el) el.innerHTML = `<div class="empty-msg">⏳ ${msg}</div>`;
}

function showError(id, msg) {
  const el = document.getElementById(id);
  if(el) el.innerHTML = `<div class="empty-msg" style="color:#c0392b;">⚠️ ${msg}</div>`;
}

// ============================
//  データ変換
// ============================
function parseSheetData(raw) {
  // 選手マスタ
  PLAYERS = raw.players
    .filter(r => r['背番号'] !== '' && r['背番号'] != null)
    .map(r => ({
      no:     Number(r['背番号']),
      name:   r['名前（漢字）'] || '',
      kana:   r['名前（ひらがな）'] || '',
      school: r['在籍小学校'] || '',
    }));

  // 試合結果（②試合結果）と出場記録（③出場記録）を結合
  const matchMap = {};
  raw.matches
    .filter(r => r['試合ID'])
    .forEach(r => {
      const id = String(r['試合ID']);
      matchMap[id] = {
        id,
        date:      formatDate(r['日付']),
        type:      r['種別'] || '',
        tournament:r['大会名 / 対戦相手名'] || '',
        scoreUs:   Number(r['自チーム\n得点'] ?? r['自チーム得点'] ?? 0),
        scoreThem: Number(r['相手\n得点'] ?? r['相手得点'] ?? 0),
        youtube:   r['YouTube URL'] || '',
        starters:  [],
        subs:      [],
        scorers:   [],
      };
    });

  // 出場記録を各試合にマージ
  const subTrack = {}; // 各試合の各選手の出場開始を追跡
  raw.appearances
    .filter(r => r['試合ID'] && r['背番号'])
    .forEach(r => {
      const id     = String(r['試合ID']);
      const no     = Number(r['背番号']);
      const start  = Number(r['出場開始\n(分)'] ?? r['出場開始(分)'] ?? 0);
      const end    = Number(r['出場終了\n(分)'] ?? r['出場終了(分)'] ?? 40);
      const goals  = Number(r['得点数'] || 0);
      const note   = r['備考'] || '';

      if(!matchMap[id]) return;
      const m = matchMap[id];

      if(start === 0) {
        m.starters.push(no);
      } else {
        // 交代IN：対応するOUT選手を探す（同じ試合で途中終了した先発）
        const outPlayer = m.starters.find(sno => {
          const outRec = raw.appearances.find(a =>
            String(a['試合ID']) === id &&
            Number(a['背番号']) === sno &&
            Number(a['出場終了\n(分)'] ?? a['出場終了(分)'] ?? 40) === start
          );
          return !!outRec;
        });
        m.subs.push({ out: outPlayer || null, in: no, minute: start });
      }
      if(goals > 0) {
        const existing = m.scorers.find(s => s.no === no);
        if(existing) existing.goals += goals;
        else m.scorers.push({ no, goals });
      }
    });

  MATCHES = Object.values(matchMap).sort((a,b) => a.date.localeCompare(b.date));
}

function formatDate(val) {
  if(!val) return '';
  if(typeof val === 'string') return val;
  // Googleスプレッドシートから日付がDate/数値で来る場合
  if(val instanceof Date || (typeof val === 'object' && val.getFullYear)) {
    const d = new Date(val);
    return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
  }
  return String(val);
}

// ============================
//  ユーティリティ
// ============================
function playerByNo(no) { return PLAYERS.find(p => p.no === no); }

function getResult(us, them) {
  if(us > them) return {label:'WIN', cls:'result-win'};
  if(us < them) return {label:'LOSE', cls:'result-lose'};
  return {label:'DRAW', cls:'result-draw'};
}

function lastName(name) {
  if(!name) return '?';
  const parts = name.split(/[\s　]/);
  return parts.length > 1 ? parts[1] : name;
}

// ============================
//  選手情報タブ
// ============================
function renderPlayers() {
  const grid = document.getElementById('playerGrid');
  if(!PLAYERS.length) {
    grid.innerHTML = '<div class="empty-msg">選手データがありません</div>';
    return;
  }
  grid.innerHTML = PLAYERS.map(p => `
    <div class="player-card">
      <div class="player-number">#${p.no}</div>
      <div class="player-name">${p.name}</div>
      <div class="player-kana">${p.kana}</div>
      <div class="player-school">${p.school}</div>
    </div>
  `).join('');
}

// ============================
//  試合結果タブ
// ============================
function filterMatches(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMatches();
}

function renderMatches() {
  const list = document.getElementById('matchList');
  const filtered = currentFilter === 'all'
    ? MATCHES
    : MATCHES.filter(m => m.type === currentFilter);

  if(!filtered.length) {
    list.innerHTML = '<div class="empty-msg">該当する試合がありません</div>';
    return;
  }

  list.innerHTML = [...filtered].reverse().map(m => {
    const res = getResult(m.scoreUs, m.scoreThem);
    const subText = m.subs.length
      ? m.subs.map(s => {
          const pOut = s.out ? playerByNo(s.out) : null;
          const pIn  = playerByNo(s.in);
          const outName = pOut ? lastName(pOut.name) : '?';
          const inName  = pIn  ? lastName(pIn.name)  : '?';
          return `<span class="player-tag">🔄 ${outName} → ${inName} (${s.minute}分)</span>`;
        }).join('')
      : '<span style="color:var(--gray);font-size:12px;">なし</span>';
    const scorerText = m.scorers.length
      ? m.scorers.map(s => {
          const p = playerByNo(s.no);
          return `<span class="player-tag scorer-tag">⚽ ${p ? lastName(p.name) : '?'} ×${s.goals}</span>`;
        }).join('')
      : '<span style="color:var(--gray);font-size:12px;">なし</span>';
    const starterText = m.starters.map(no => {
      const p = playerByNo(no);
      return `<span class="player-tag">#${no} ${p ? lastName(p.name) : '?'}</span>`;
    }).join('');

    return `
      <div class="match-card">
        <div class="match-header">
          <span class="match-badge ${m.type==='公式戦'?'badge-official':'badge-trm'}">${m.type}</span>
          <div>
            <div class="match-name">${m.tournament}</div>
            <div class="match-date">${m.date}</div>
          </div>
          <span class="score-result ${res.cls}" style="margin-left:auto;">${res.label}</span>
        </div>
        <div class="match-body">
          <div class="score-row">
            <div class="team-name" style="text-align:right;">さぎぬまSC<br><small style="font-weight:400;color:var(--gray);font-size:11px;">47期</small></div>
            <div class="score-box">
              <div class="score-num">${m.scoreUs}</div>
              <div class="score-sep">–</div>
              <div class="score-num">${m.scoreThem}</div>
            </div>
            <div class="team-name">${m.tournament.replace(/.*vs\s*/i,'') || '相手チーム'}</div>
          </div>
          <div class="match-details">
            <div class="detail-block">
              <div class="detail-label">先発メンバー</div>
              <div class="detail-content">${starterText || '<span style="color:var(--gray);font-size:12px;">未入力</span>'}</div>
            </div>
            <div class="detail-block">
              <div class="detail-label">交代</div>
              <div class="detail-content">${subText}</div>
            </div>
            <div class="detail-block">
              <div class="detail-label">得点者</div>
              <div class="detail-content">${scorerText}</div>
            </div>
            <div class="detail-block">
              <div class="detail-label">動画</div>
              <div class="detail-content">
                ${m.youtube
                  ? `<a href="${m.youtube}" target="_blank" class="yt-link">▶ YouTube で見る</a>`
                  : '<span style="color:var(--gray);font-size:12px;">なし</span>'
                }
              </div>
            </div>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

// ============================
//  成績表タブ
// ============================
function calcStats(matchList) {
  let w=0,d=0,l=0,gf=0,ga=0;
  matchList.forEach(m => {
    gf += m.scoreUs; ga += m.scoreThem;
    const r = getResult(m.scoreUs, m.scoreThem);
    if(r.label==='WIN') w++;
    else if(r.label==='DRAW') d++;
    else l++;
  });
  return {w,d,l,gf,ga,games:matchList.length};
}

function renderStats() {
  const now = new Date();
  const currentMonth = now.getMonth() + 1;
  const currentYear  = now.getFullYear();
  document.getElementById('currentMonthLabel').textContent = `${currentYear}年${currentMonth}月`;

  const thisMonthMatches = MATCHES.filter(m => {
    const d = new Date(m.date.replace(/\//g,'-'));
    return d.getMonth()+1 === currentMonth && d.getFullYear() === currentYear;
  });
  const monthS = calcStats(thisMonthMatches);
  const totalS = calcStats(MATCHES);

  const makeStats = (s) => `
    <div class="stat-card"><div class="stat-label">試合数</div><div class="stat-value">${s.games}</div><div class="stat-sub">games</div></div>
    <div class="stat-card"><div class="stat-label">勝利</div><div class="stat-value" style="color:var(--green-light);">${s.w}</div><div class="stat-sub">wins</div></div>
    <div class="stat-card"><div class="stat-label">引分</div><div class="stat-value" style="color:var(--gold-dark);">${s.d}</div><div class="stat-sub">draws</div></div>
    <div class="stat-card"><div class="stat-label">敗戦</div><div class="stat-value" style="color:#c0392b;">${s.l}</div><div class="stat-sub">losses</div></div>
    <div class="stat-card"><div class="stat-label">総得点</div><div class="stat-value">${s.gf}</div><div class="stat-sub">goals for</div></div>
    <div class="stat-card"><div class="stat-label">総失点</div><div class="stat-value">${s.ga}</div><div class="stat-sub">goals against</div></div>
  `;
  document.getElementById('monthStats').innerHTML = makeStats(monthS);
  document.getElementById('totalStats').innerHTML = makeStats(totalS);
  renderRanking();
}

function switchRanking(mode, btn) {
  currentRankingMode = mode;
  document.querySelectorAll('.rank-tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderRanking();
}

function renderRanking() {
  const targetMatches = currentRankingMode === 'official'
    ? MATCHES.filter(m => m.type === '公式戦')
    : MATCHES;

  const goalMap = {};
  targetMatches.forEach(m => {
    m.scorers.forEach(s => {
      goalMap[s.no] = (goalMap[s.no] || 0) + s.goals;
    });
  });

  const ranking = Object.entries(goalMap)
    .map(([no, goals]) => ({no: Number(no), goals}))
    .sort((a,b) => b.goals - a.goals);

  if(!ranking.length) {
    document.getElementById('rankingList').innerHTML = '<div class="empty-msg">得点データがありません</div>';
    return;
  }

  const rankClasses = ['gold','silver','bronze'];
  document.getElementById('rankingList').innerHTML = ranking.map((r,i) => {
    const p = playerByNo(r.no);
    const posCls   = i < 3 ? rankClasses[i] : 'other';
    const posLabel = i < 3 ? ['🥇','🥈','🥉'][i] : `${i+1}`;
    return `
      <div class="rank-row">
        <div class="rank-pos ${posCls}">${posLabel}</div>
        <div class="rank-num-badge">${r.no}</div>
        <div class="rank-name">
          ${p ? p.name : `#${r.no}`}
          <div class="rank-kana">${p ? p.kana : ''}</div>
        </div>
        <div class="rank-goals">${r.goals}<span> 点</span></div>
      </div>
    `;
  }).join('');
}

// ============================
//  タブ切り替え
// ============================
function showTab(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
}

// ============================
//  初期化：スプレッドシートから全データ取得
// ============================
async function init() {
  // ローディング表示
  showLoading('playerGrid', '選手データを読み込み中...');
  showLoading('matchList',  '試合データを読み込み中...');
  showLoading('monthStats', 'データを読み込み中...');
  showLoading('totalStats', '');
  showLoading('rankingList','');

  try {
    const [players, matches, appearances] = await Promise.all([
      fetchSheet('①選手マスタ'),
      fetchSheet('②試合結果'),
      fetchSheet('③出場記録'),
    ]);

    parseSheetData({ players, matches, appearances });

    renderPlayers();
    renderMatches();
    renderStats();

  } catch(err) {
    console.error(err);
    showError('playerGrid', 'データの読み込みに失敗しました。しばらくしてから再読み込みしてください。');
    showError('matchList',  'データの読み込みに失敗しました。');
    showError('monthStats', 'データの読み込みに失敗しました。');
  }
}

init();
</script>
